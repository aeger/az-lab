name: uptime-kuma

# Extracted from az-lab-dashboard 2026-04-30 so dashboard rebuilds
# don't take uptime-kuma down. The data volume is reused as-is via
# `external: true` so no data migration was required.

services:
  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    restart: unless-stopped
    volumes:
      - uptime-kuma-data:/app/data
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.uptime-kuma.rule=Host(`uptime.az-lab.dev`)"
      - "traefik.http.routers.uptime-kuma.entrypoints=websecure"
      - "traefik.http.routers.uptime-kuma.tls=true"
      - "traefik.http.routers.uptime-kuma.middlewares=lan-allow@file"
      - "traefik.http.services.uptime-kuma.loadbalancer.server.port=3001"

volumes:
  uptime-kuma-data:
    external: true
    name: az-lab-dashboard_uptime-kuma-data

networks:
  proxy:
    external: true
