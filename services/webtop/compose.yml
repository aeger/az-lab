version: "3.9"

services:
  webtop:
    image: lscr.io/linuxserver/webtop:ubuntu-xfce
    container_name: webtop
    restart: unless-stopped

    security_opt:
      - seccomp:unconfined

    networks:
      - proxy

    ports:
      - "${WEBTOP_PORT:-3080}:3000"

    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Phoenix}
      - SUBFOLDER=/
      - TITLE=az-lab Webtop

    volumes:
      - ./config:/config
      - /dev/shm:/dev/shm
      - /home/almty1:/host/home:ro
      - /home/almty1/azlab:/host/azlab

    shm_size: "1gb"

    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 4G
        reservations:
          memory: 512M

networks:
  proxy:
    external: true
