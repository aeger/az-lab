services:
  website:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: website
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.website.rule=Host(`www.az-lab.dev`) || Host(`az-lab.dev`)"
      - "traefik.http.routers.website.entrypoints=websecure"
      - "traefik.http.routers.website.tls.certresolver=cloudflare"
      - "traefik.http.services.website.loadbalancer.server.port=8080"
      # Redirect bare domain to www
      - "traefik.http.middlewares.www-redirect.redirectregex.regex=^https://az-lab\\.dev/(.*)"
      - "traefik.http.middlewares.www-redirect.redirectregex.replacement=https://www.az-lab.dev/$${1}"
      - "traefik.http.middlewares.www-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.website.middlewares=www-redirect"

networks:
  proxy:
    external: true
