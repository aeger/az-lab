http:
  routers:
    code-server:
      rule: "Host(`code.az-lab.dev`)"
      entryPoints:
        - websecure
      service: code-server
      tls:
        certResolver: le
      middlewares:
        - authelia-auth@file

  services:
    code-server:
      loadBalancer:
        servers:
          - url: "http://code-server:8443"
        passHostHeader: true
