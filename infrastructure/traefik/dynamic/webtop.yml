http:
  routers:
    webtop:
      rule: Host(`svc-podman-01.az-lab.dev`)
      entryPoints:
        - websecure
      service: webtop
      tls:
        certResolver: le
      middlewares:
        - lan-allow@file
        - authelia-auth@file
        - strip-www-auth@file

  services:
    webtop:
      loadBalancer:
        servers:
          - url: http://webtop:3000
        passHostHeader: true
